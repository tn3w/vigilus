<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vigilus — Browser Integrity Challenge</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: system-ui, sans-serif;
                max-width: 640px;
                margin: 2rem auto;
                padding: 0 1rem;
                color: #1a1a2e;
                background: #f5f5f7;
            }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }
            .subtitle {
                color: #666;
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
            }
            #status {
                padding: 1rem;
                border-radius: 8px;
                margin-bottom: 1rem;
                font-weight: 500;
            }
            .solving {
                background: #fff3cd;
                color: #856404;
            }
            .success {
                background: #d4edda;
                color: #155724;
            }
            .failure {
                background: #f8d7da;
                color: #721c24;
            }
            button {
                padding: 0.6rem 1.2rem;
                border: none;
                border-radius: 6px;
                background: #1a1a2e;
                color: white;
                cursor: pointer;
                font-size: 0.9rem;
            }
            button:disabled {
                background: #999;
                cursor: not-allowed;
            }
            pre {
                margin-top: 1rem;
                padding: 1rem;
                background: #1a1a2e;
                color: #e0e0e0;
                border-radius: 8px;
                overflow-x: auto;
                font-size: 0.85rem;
                white-space: pre-wrap;
                min-height: 2rem;
            }
        </style>
    </head>
    <body>
        <h1>Vigilus</h1>
        <p class="subtitle">Browser Integrity Challenge</p>

        <div id="status" class="solving">Starting challenge&hellip;</div>

        <button id="protectedButton" disabled>Access Protected Resource</button>

        <pre id="output"></pre>

        <script type="module">
            import { solveChallenge } from './solver.js';

            const status = document.getElementById('status');
            const protectedButton = document.getElementById('protectedButton');
            const output = document.getElementById('output');
            let token = null;

            try {
                const start = performance.now();
                const result = await solveChallenge({
                    onProgress(stage, total) {
                        status.textContent = `Solving stage ${stage}/${total}\u2026`;
                    },
                });
                const elapsed = (performance.now() - start).toFixed(0);

                token = result.token;
                status.className = 'success';
                status.textContent = `Challenge solved in ${elapsed}ms`;
                protectedButton.disabled = false;
            } catch (error) {
                status.className = 'failure';
                status.textContent = `Challenge failed: ${error.message}`;
            }

            protectedButton.addEventListener('click', async () => {
                const response = await fetch('/protected', {
                    headers: { Authorization: `Bearer ${token}` },
                });

                output.textContent = JSON.stringify(await response.json(), null, 2);
            });
        </script>
    </body>
</html>
